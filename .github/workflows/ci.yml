name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # npm ci wipes node_modules on every run, so this must be restored after
      # install. Without it, Vitest's esbuild dep pre-bundle (exceljs,
      # pptxgenjs, docx, @react-pdf/renderer, tiptap, ...) re-scans cold on
      # every CI run, adding several minutes to `npm test`.
      - uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-deps-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            vite-deps-${{ runner.os }}-
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      - run: npm run check:bundle
      - run: npm audit --omit=dev --audit-level=high
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project=chromium
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
